<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>My local site</title>
    <style>
        :root {
            color-scheme: light;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100dvh;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            line-height: 1.5;
            color: #111827;
            background: linear-gradient(180deg, #f7fafc 0%, #eaf2ff 100%);
            display: grid;
            place-items: start center;
            padding: 16px;
        }

        main {
            width: min(100%, 560px);
            background: #ffffff;
            border: 1px solid #e5e7eb;
            border-radius: 14px;
            padding: 20px;
            box-shadow: 0 10px 24px rgba(17, 24, 39, 0.08);
        }

        h1 {
            margin: 0 0 8px;
            font-size: clamp(1.5rem, 4vw, 2rem);
            line-height: 1.2;
        }

        p {
            margin: 0;
            font-size: clamp(1rem, 2.8vw, 1.125rem);
            color: #374151;
        }

        form {
            margin-top: 16px;
            display: grid;
            gap: 10px;
        }

        label {
            font-weight: 600;
            color: #1f2937;
        }

        input[type="text"] {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            font-size: 1rem;
        }

        button[type="submit"] {
            justify-self: start;
            padding: 10px 14px;
            border: 0;
            border-radius: 10px;
            background: #2563eb;
            color: #ffffff;
            font-weight: 600;
            font-size: 0.95rem;
        }
    </style>
</head>

<body>
    <main>
        <h1>My local site</h1>
        <p>This is a local site.</p>
        <form id="name-form">
            <label for="name">Name</label>
            <input id="name" name="name" type="text" placeholder="Enter your name" />
            <button type="submit">Submit</button>
        </form>
        <div id="js-content"></div>
    </main>
    <script>
        const form = document.getElementById('name-form');
        const nameInput = document.getElementById('name');
        const jsContent = document.getElementById('js-content');

        form.addEventListener('submit', function (event) {
            event.preventDefault();

            const enteredName = nameInput.value.trim();
            jsContent.textContent = enteredName ? enteredName : 'Please enter a name.';
        });
    </script>
</body>

</html>
